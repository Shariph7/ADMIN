<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mero Vidya</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome for login icon -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
    }

    nav {
      width: 100%;
      background: linear-gradient(to right, #756EF3, #2B75DA);
      padding: 12px 70px; /* Exact spacing from left/right as in image */
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }

    .logo-container img {
      width: 28px;
      height: 28px;
    }

    .nav-items {
      display: flex;
      align-items: center;
      gap: 35px;
    }

    .nav-items a {
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 400;
      transition: 0.3s ease;
    }

    .nav-items a:hover {
      opacity: 0.85;
    }

    .login-btn {
      border: 1px solid white;
      padding: 6px 18px;
      background: transparent;
      color: white;
      border-radius: 5px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-btn i {
      font-size: 14px;
    }

    .login-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    @media(max-width: 768px) {
      nav {
        padding: 12px 20px;
      }

      .nav-items {
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo-container">
      <img src="your-logo.svg" alt="Logo">
      MERO VIDYA
    </div>

    <div class="nav-items">
      <a href="#">About Us</a>
      <a href="#">Features</a>
      <a href="#">Contact Us</a>
      <button class="login-btn">
        Login <i class="fas fa-sign-in-alt"></i>
      </button>
    </div>
  </nav>

</body>
</html>
